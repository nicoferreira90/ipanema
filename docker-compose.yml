services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
    env_file:
      - ./ipanema/.env
    environment:
      # inside the compose network the db is reachable as "db:5432";
      # .env keeps 127.0.0.1:6543 for running Django on the host
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    ports:
      # host 8000 is taken by gsmpd.net's web container
      - 8001:8000
    depends_on:
      - db
  db:
    image: postgres:17
    container_name: ipanema-db
    restart: unless-stopped
    volumes:
      - ipanema_pgdata:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ipanema}
      - POSTGRES_USER=${POSTGRES_USER:-ipanema}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ipanema}
    ports:
      # 5432 falls in a Windows Hyper-V excluded port range on this machine
      - "6543:5432"

volumes:
  ipanema_pgdata:
