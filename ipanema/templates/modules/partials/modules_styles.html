<style>
  /* ====== module + lesson shared styling (par avion / philatelic) ====== */

  .chapter-eyebrow {
    display: inline-flex; align-items: center; gap: .55rem;
    font-family: "Fragment Mono", monospace;
    font-size: .68rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--teal);
  }

  /* ---- philatelic lesson checklist ---- */
  .lesson-card {
    display: flex; align-items: center; gap: 1.1rem;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 4px;
    padding: 1rem 1.2rem;
    box-shadow: 5px 5px 0 rgba(31, 75, 68, .14);
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .lesson-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 8px 8px 0 rgba(31, 75, 68, .18);
  }
  .lesson-num {
    font-family: "Fraunces", serif; font-weight: 900; line-height: 1;
    border: 2px solid var(--ink); padding: .3rem .5rem; flex-shrink: 0;
    background: var(--cream);
  }
  .lesson-card.is-done { background: #f0faf3; border-color: var(--teal); }
  .lesson-card.is-done .lesson-num { border-color: var(--teal); color: var(--teal); }

  .tick-stamp {
    flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid var(--teal); color: var(--teal);
    display: flex; align-items: center; justify-content: center;
    transform: rotate(-8deg);
  }

  /* ---- exercise / project callout ---- */
  .exercise-card {
    background: var(--cream);
    border: 2px dashed rgba(31, 75, 68, .45);
    border-radius: 10px;
    padding: 1.4rem 1.6rem;
  }
  .exercise-tag {
    font-family: "Fragment Mono", monospace;
    font-size: .66rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--coral); font-weight: 700;
  }

  /* ---- lesson prose ---- */
  .prose { line-height: 1.72; font-size: 1.06rem; }
  .prose > * + * { margin-top: 1.05rem; }
  .prose h2, .prose h3 { font-family: "Fraunces", serif; font-weight: 800; }
  .prose code {
    font-family: "Fragment Mono", monospace; font-size: .86em;
    background: rgba(253, 122, 86, .12); color: var(--ink-deep);
    padding: .12em .4em; border-radius: 5px;
  }
  .prose pre {
    background: #fdf6e7;
    border: 1.5px solid rgba(31, 75, 68, .2);
    border-radius: 10px;
    padding: .9rem 1.1rem; overflow-x: auto;
  }
  .prose pre code { background: none; padding: 0; font-size: .82rem; line-height: 1.65; }
  .prose strong { color: var(--ink-deep); }

  /* ---- code runner ---- */
  .runner { position: relative; }
  .editor-shell {
    background: #fdf6e7;
    border: 1.5px solid rgba(31, 75, 68, .3);
    border-radius: 12px 12px 0 0;
    border-bottom: none;
    overflow: hidden;
  }
  .editor-shell-head {
    display: flex; align-items: center; gap: .5rem;
    padding: .5rem .85rem;
    border-bottom: 1px solid rgba(31, 75, 68, .14);
    font-family: "Fragment Mono", monospace;
    font-size: .64rem; letter-spacing: .14em; text-transform: uppercase;
    color: rgba(31, 75, 68, .55);
  }
  .editor {
    width: 100%; border: none; outline: none; resize: vertical;
    background: transparent; color: var(--ink-deep);
    font-family: "Fragment Mono", monospace;
    font-size: .82rem; line-height: 1.7;
    padding: .9rem 1.1rem; min-height: 180px; display: block;
    tab-size: 4;
  }
  .editor::placeholder { color: rgba(31, 75, 68, .4); }

  .runner-bar {
    display: flex; align-items: center; gap: 1rem;
    background: #f6ecd6;
    border: 1.5px solid rgba(31, 75, 68, .3);
    border-top: 1px dashed rgba(31, 75, 68, .3);
    padding: .6rem .85rem;
  }
  .runner-status { font-size: .8rem; opacity: .8; }
  .runner-status.ok { color: var(--teal); opacity: 1; font-weight: 700; }
  .runner-status.no { color: var(--raspberry); opacity: 1; font-weight: 700; }

  /* terminal (mirrors landing demo) */
  .term {
    background: var(--ink-deep);
    border-radius: 0 0 12px 12px;
    position: relative; overflow: hidden;
    box-shadow: inset 0 0 0 1.5px rgba(255, 249, 239, .08);
  }
  .term-head {
    display: flex; align-items: center; gap: .4rem;
    padding: .6rem 1rem;
    border-bottom: 1px solid rgba(255, 249, 239, .12);
    color: rgba(255, 249, 239, .5);
    font-family: "Fragment Mono", monospace; font-size: .64rem;
    letter-spacing: .12em; text-transform: uppercase;
  }
  .term-dot { width: 10px; height: 10px; border-radius: 50%; }
  .term-body {
    padding: .85rem 1rem 1.05rem;
    font-family: "Fragment Mono", monospace;
    font-size: .76rem; line-height: 1.62; color: #f3ecdc;
    overflow-y: auto; min-height: 120px; max-height: 320px;
  }
  .term-line { white-space: pre-wrap; word-break: break-word; min-height: 1.1em; }
  .term-line.dim { color: rgba(243, 236, 220, .5); }
  .term-line.fail { color: #ff9d84; }
  .term-line.hint { color: var(--yellow); }
  .term-line.pass { color: #6ee7a8; font-weight: 600; }

  .passed-stamp {
    position: absolute; right: 16px; bottom: 16px;
    border: 3px solid #6ee7a8; color: #6ee7a8; border-radius: 6px;
    font-family: "Fragment Mono", monospace; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase;
    padding: .4rem .9rem; font-size: .72rem;
    transform: rotate(-9deg) scale(2.2); opacity: 0; pointer-events: none;
  }
  .passed-stamp.show { animation: slam .5s cubic-bezier(.2, 1.4, .4, 1) forwards; }
  @keyframes slam {
    from { opacity: 0; transform: rotate(-9deg) scale(2.2); }
    60%  { opacity: 1; transform: rotate(-9deg) scale(.92); }
    to   { opacity: 1; transform: rotate(-9deg) scale(1); }
  }

  /* completion banner (swapped in by HTMX) */
  .done-banner {
    display: flex; align-items: center; gap: .85rem;
    background: #f0faf3; border: 2px solid var(--teal);
    border-radius: 10px; padding: .9rem 1.2rem; color: var(--teal);
    font-weight: 700;
  }

  .coming-veil {
    border: 2px dashed rgba(31, 75, 68, .35); border-radius: 12px;
    background: rgba(255, 249, 239, .5); padding: 2.5rem;
    text-align: center;
  }
</style>
