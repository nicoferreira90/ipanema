<!-- sticky pill nav -->
<header class="sticky top-4 z-40 max-w-4xl mx-auto px-4 reveal" style="animation-delay:.05s">
  <div class="nav-pill px-6 py-3 flex items-center justify-between">
    <a href="{% url 'core:index' %}" class="flex items-center gap-2 font-extrabold text-xl tracking-tight">
      <svg width="26" height="26" viewBox="0 0 26 26"><circle cx="13" cy="13" r="11" fill="#f9d157"/><circle cx="13" cy="13" r="6.5" fill="#fd7a56"/></svg>
      Ipanema
    </a>
    <nav class="hidden md:flex items-center gap-7">
      <a class="nav-link" href="{% url 'core:index' %}#modules">Modules</a>
      <a class="nav-link" href="{% url 'core:index' %}#shore">Method</a>
      <a class="nav-link" href="{% url 'core:progress' %}">Progress</a>
    </nav>
    {% if user.is_authenticated %}
    <div class="flex items-center gap-4">
      <a class="nav-link hidden sm:inline max-w-[16ch] truncate" href="{% url 'core:progress' %}">{{ user.get_short_name }}</a>
      <a href="{% url 'account_logout' %}" class="btn-shell !py-2 !px-5 text-sm">Log out</a>
    </div>
    {% else %}
    <div class="flex items-center gap-4">
      <a class="nav-link" href="{% url 'account_login' %}">Log in</a>
      <a href="{% url 'account_signup' %}" class="btn-sunrise !py-2 !px-5 text-sm">Sign up</a>
    </div>
    {% endif %}
  </div>
</header>
